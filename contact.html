<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Contact Us - BloodVine</title>
<!-- Include EmailJS SDK -->
<script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
<script type="text/javascript">
  // Initialize EmailJS with your public key
  (function() {
    emailjs.init("kUBZAGfCosCDHAvRT"); // Replace with your actual EmailJS public key
  })();
  
  // Function to handle form submission
  function sendEmail(event) {
    event.preventDefault();
    
    // Get form elements
    const form = document.getElementById('contact-form');
    const statusMessage = document.getElementById('status-message');
    const submitBtn = document.getElementById('submit-btn');
    
    // Show loading state
    submitBtn.disabled = true;
    submitBtn.textContent = 'Sending...';
    statusMessage.innerHTML = '';
    
    // Send email using EmailJS
    emailjs.sendForm('service_fh1y1vm', 'template_fnegoya', form)
      .then(function(response) {
        console.log('SUCCESS!', response.status, response.text);
        statusMessage.innerHTML = '<div class="status-message success">Message sent successfully!</div>';
        form.reset();
      }, function(error) {
        console.log('FAILED...', error);
        statusMessage.innerHTML = '<div class="status-message error">Failed to send message. Please try again.</div>';
      })
      .finally(function() {
        // Reset button state
        submitBtn.disabled = false;
        submitBtn.textContent = 'Send';
      });
  }
  
  // Attach event listener when page loads
  window.onload = function() {
    document.getElementById('contact-form').addEventListener('submit', sendEmail);
  };
</script>
<style>
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    line-height: 1.6;
    margin: 0;
    padding: 0;
    background-color: #f5f5f5;
    color: #333;
  }
  
  .page-container {
    max-width: 800px;
    margin: 0 auto;
    padding: 20px;
    background-color: white;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
    border-radius: 8px;
    margin-top: 20px;
    margin-bottom: 20px;
  }
  
  h1 {
    color: #8b0000; /* Blood red color theme */
    border-bottom: 2px solid #8b0000;
    padding-bottom: 10px;
  }
  
  h2 {
    color: #8b0000;
    margin-top: 30px;
  }
  
  ul {
    padding-left: 20px;
  }
  
  li {
    margin-bottom: 10px;
  }
  
  form {
    margin-top: 20px;
  }
  
  label {
    display: block;
    margin-bottom: 5px;
    font-weight: bold;
  }
  
  input[type="text"],
  input[type="email"],
  textarea {
    width: 100%;
    padding: 10px;
    border: 1px solid #ddd;
    border-radius: 4px;
    box-sizing: border-box;
    font-family: inherit;
    margin-bottom: 15px;
  }
  
  textarea {
    resize: vertical;
    min-height: 120px;
  }
  
  .btn {
    background-color: #8b0000;
    color: white;
    border: none;
    padding: 12px 20px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 16px;
    transition: background-color 0.3s;
  }
  
  .btn:hover {
    background-color: #a00000;
  }
  
  .btn:disabled {
    background-color: #cccccc;
    cursor: not-allowed;
  }
  
  .status-message {
    padding: 10px;
    margin: 10px 0;
    border-radius: 4px;
    text-align: center;
  }
  
  .success {
    background-color: #d4edda;
    color: #155724;
    border: 1px solid #c3e6cb;
  }
  
  .error {
    background-color: #f8d7da;
    color: #721c24;
    border: 1px solid #f5c6cb;
  }
  
  footer {
    text-align: center;
    padding: 20px;
    background-color: #333;
    color: white;
    margin-top: 30px;
  }
  
  footer a {
    color: #ddd;
    text-decoration: none;
    margin: 0 10px;
  }
  
  footer a:hover {
    color: white;
    text-decoration: underline;
  }
  
  .emailjs-credit {
    text-align: center;
    margin-top: 20px;
    font-size: 14px;
    color: #666;
  }
  
  .emailjs-credit a {
    color: #8b0000;
    text-decoration: none;
  }
  
  .emailjs-credit a:hover {
    text-decoration: underline;
  }
</style>
</head>
<body>
<div class="page-container">
  <h1>Contact Us</h1>
  <p>If you have questions or feedback, please reach out:</p>
  <ul>
    <li>Email: lukew296@proton.me</li>
  </ul>
  
  <h2>Send us a message</h2>
  
  <!-- Status message container -->
  <div id="status-message"></div>
  
  <form id="contact-form">
    <label for="user_name">Name:</label>
    <input type="text" id="user_name" name="user_name" required>
    
    <label for="user_email">Email:</label>
    <input type="email" id="user_email" name="user_email" required>
    
    <label for="message">Message:</label>
    <textarea id="message" name="message" required></textarea>
    <button type="submit" id="submit-btn" class="btn">Send</button>
  </form>
  
  <div class="emailjs-credit">
    <p>Powered by <a href="https://www.emailjs.com" target="_blank">EmailJS</a></p>
  </div>
</div>

</html>
